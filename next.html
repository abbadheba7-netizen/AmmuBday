<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome To Ram's Heart</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      font-family:sans-serif;
      background:url("heart-bg.jpg") no-repeat center center/cover;
      position:relative;
      animation: fadeIn 2s ease forwards;
    }

    body::after{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.35);
      top:0;
      left:0;
      z-index:1;
    }

    .title{
      position:absolute;
      top:40px;
      width:100%;
      text-align:center;
      font-family:'Great Vibes', cursive;
      font-size:65px;
      color:#ffffff;
      text-shadow:0 0 25px rgba(255,255,255,0.9);
      z-index:2;
      animation: slideDown 2s ease;
    }

    .girl{
      position:absolute;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      height:75%;
      z-index:2;
      object-fit:contain;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
    }

    .enter-btn{
      position:absolute;
      bottom:40px;
      right:40px;
      padding:12px 32px;
      font-size:18px;
      background:#ff4d6d;
      color:white;
      border:none;
      border-radius:30px;
      cursor:pointer;
      z-index:3;
      transition:0.3s;
    }

    .enter-btn:hover{
      background:#ff1e56;
      transform:scale(1.05);
    }

    @keyframes fadeIn{
      from{opacity:0;}
      to{opacity:1;}
    }

    @keyframes slideDown{
      from{transform:translateY(-50px); opacity:0;}
      to{transform:translateY(0); opacity:1;}
    }
  </style>
</head>
<body>

<h1 class="title">Welcome To Ram's Heart</h1>

<img src="girl.png" class="girl">

<button class="enter-btn" onclick="goNext()">Enter</button>

<script>
function goNext(){
  window.location.href = "love.html";
}
</script>

</body>
</html>
