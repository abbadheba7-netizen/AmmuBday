<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Sita</title>

  <!-- Cursive Font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<div class="container">
  <h1 class="title">Happy Birthday Sita</h1>
  <button class="enter-btn" id="openPopup">Enter</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-content">

    <!-- ❌ Close Button -->
    <span class="close-btn" id="closePopup">✕</span>

    <p class="subtitle">Enter a special date</p>

    <div class="password-box" id="passwordBox">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="keypad">
      <div class="key" data-num="1">1</div>
      <div class="key" data-num="2">2</div>
      <div class="key" data-num="3">3</div>
      <div class="key" data-num="4">4</div>
      <div class="key" data-num="5">5</div>
      <div class="key" data-num="6">6</div>
      <div class="key" data-num="7">7</div>
      <div class="key" data-num="8">8</div>
      <div class="key" data-num="9">9</div>
      <div class="key empty"></div>
      <div class="key" data-num="0">0</div>
      <div class="key clear">⌫</div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
