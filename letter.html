<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Love Letter 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  background:linear-gradient(135deg,#ffdde1,#ee9ca7);
  font-family:'Dancing Script', cursive;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* 🌸 Floating Petals */
.petal{
  position:fixed;
  font-size:18px;
  animation:fall linear infinite;
  pointer-events:none;
  z-index:1;
}

@keyframes fall{
  0%{transform:translateY(-10vh) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

/* ✉ Letter Box */
.letter{
  width:75%;
  max-width:900px;
  height:85vh; /* Fixed height */
  background:white;
  padding:50px;
  border-radius:20px;
  box-shadow:0 25px 70px rgba(0,0,0,0.3);
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
}

/* Watermark */
.letter::before{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:70%;
  height:70%;
  background:url("watermark.png") no-repeat center;
  background-size:contain;
  opacity:0.12;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

/* Home Button */
.home-btn{
  position:absolute;
  top:20px;
  right:30px;
  font-size:26px;
  cursor:pointer;
  color:#d81b60;
  z-index:3;
}

/* Title */
h1{
  font-family:'Great Vibes', cursive;
  font-size:55px;
  color:#d81b60;
  text-align:center;
  margin-bottom:15px;
}

/* Scrollable Content Area */
.content{
  flex:1;
  overflow-y:auto; /* Scroll enabled */
  font-size:22px;
  line-height:1.6;
  color:#444;
  text-align:center;
  padding-right:10px;
}

/* Custom Scrollbar */
.content::-webkit-scrollbar{
  width:6px;
}
.content::-webkit-scrollbar-thumb{
  background:#ffb6c1;
  border-radius:10px;
}

/* Line animation */
.line{
  opacity:0;
  transform:translateY(10px);
  animation:fadeLine 0.8s forwards;
}

@keyframes fadeLine{
  to{opacity:1;transform:translateY(0);}
}

/* Signature */
.signature{
  text-align:right;
  font-size:24px;
  color:#d81b60;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="letter">
  <div class="home-btn" onclick="goHome()">🏠</div>
  <h1 id="title"></h1>
  <div class="content" id="text"></div>
  <div class="signature">
    Your Lovely Ram 💌
  </div>
</div>

<script>

// Get Name
const params = new URLSearchParams(window.location.search);
const herName = params.get("name") || "My Love";

document.getElementById("title").innerText = `My Dearest Sita 💖`;

const lines = [
"From the moment you came into my life,",
"everything started feeling magical.",
"",
"Your smile became my sunrise,",
"your voice became my favorite melody,",
"and your love became my strength.",
"",
"Today when you said YES,",
"it wasn't just a word…",
"it was the beginning of our forever.",
"",
"I promise to stand beside you,",
"hold your hand,",
"and love you more with every passing day.",
"",
"You are my heart.",
"You are my home.",
"You are my forever.",
"",
`I love you endlessly, Pottodaa.... 💖`
];

let index = 0;

function showNextLine(){
  if(index < lines.length){
    const div = document.createElement("div");
    div.className = "line";
    div.style.animationDelay = "0s";
    div.innerText = lines[index];
    document.getElementById("text").appendChild(div);
    index++;
    setTimeout(showNextLine, 600);
  }
}

showNextLine();

/* Petals */
setInterval(()=>{
  let petal=document.createElement("div");
  petal.className="petal";
  petal.innerHTML="🌸";
  petal.style.left=Math.random()*100+"vw";
  petal.style.animationDuration=(5+Math.random()*4)+"s";
  document.body.appendChild(petal);
  setTimeout(()=>petal.remove(),9000);
},600);

function goHome(){
  window.location.href="celebration.html";
}
</script>

</body>
</html>
